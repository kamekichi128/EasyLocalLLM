<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>{{{ PRODUCT_NAME }}}</title>
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="TemplateData/style.css" />

    <script src="https://cdn.jsdelivr.net/npm/@wllama/wllama@latest/src/single-thread/wllama.min.js"></script>
    <script src="StreamingAssets/EasyLocalLLM/WebGL/EasyLocalLLMLlamaBridgeRuntime.js"></script>
</head>

<body>
    <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas" width={{{ WIDTH }}} height={{{ HEIGHT }}} tabindex="-1"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-footer">
            <div id="unity-build-title">{{{ PRODUCT_NAME }}}</div>
            <button id="unity-fullscreen-button" type="button">Fullscreen</button>
        </div>
    </div>

    <script>
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var fullscreenButton = document.querySelector("#unity-fullscreen-button");

        function unityShowBanner(msg, type) {
            if (type === "error") {
                console.error(msg);
            } else if (type === "warning") {
                console.warn(msg);
            } else {
                console.log(msg);
            }
        }

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
        var config = {
            dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
            frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
            #if USE_THREADS
        workerUrl: buildUrl + "/{{{ WORKER_FILENAME }}}",
            #endif
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#if MEMORY_FILENAME
        memoryUrl: buildUrl + "/{{{ MEMORY_FILENAME }}}",
            #endif
        #if SYMBOLS_FILENAME
        symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
            #endif
        streamingAssetsUrl: "StreamingAssets",
            companyName: "{{{ COMPANY_NAME }}}",
                productName: "{{{ PRODUCT_NAME }}}",
                    productVersion: "{{{ PRODUCT_VERSION }}}",
                        showBanner: unityShowBanner,
      };

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            document.querySelector("#unity-container").className = "unity-mobile";
            canvas.className = "unity-mobile";
        }

        loadingBar.style.display = "block";

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = function () {
            createUnityInstance(canvas, config, function (progress) {
                progressBarFull.style.width = 100 * progress + "%";
            }).then(function (unityInstance) {
                loadingBar.style.display = "none";
                fullscreenButton.onclick = function () {
                    unityInstance.SetFullscreen(1);
                };
            }).catch(function (message) {
                alert(message);
            });
        };
        document.body.appendChild(script);
    </script>
</body>

</html>
